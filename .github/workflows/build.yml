name: Build Android APK

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Decode keystore
      env:
        ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      run: |
        mkdir -p .keystore
        echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > .keystore/release.jks

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Make gradlew executable
      run: chmod +x ./gradlew || echo "gradlew not found, will use gradle directly"

    - name: Setup Gradle
      uses: gradle/gradle-build-action@v2

    - name: Restore google-services.json
      env:
        GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
      run: |
        printf '%s' "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > app/google-services.json

    - name: Cache Gradle dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Build release
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/.keystore/release.jks
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        NTFY_URL: ${{ secrets.NTFY_URL }}
        NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
        NTFY_TOPIC_PATTERN: ${{ secrets.NTFY_TOPIC_PATTERN }}
      run: ./gradlew :app:assembleRelease

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release-apk
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 30
        if-no-files-found: warn
