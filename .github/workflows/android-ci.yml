name: Android CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Prepare CI files
        run: |
          mkdir -p .keystore app

          keytool -genkeypair \
            -alias ci \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storetype JKS \
            -keystore .keystore/release.jks \
            -storepass android \
            -keypass android \
            -dname "CN=CI,O=MobileMail,C=US"

          cat > app/google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "1234567890",
              "project_id": "mobilemail-ci",
              "storage_bucket": "mobilemail-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:1234567890:android:abcdef123456",
                  "android_client_info": {
                    "package_name": "com.mobilemail"
                  }
                },
                "api_key": [
                  {
                    "current_key": "fake-ci-key"
                  }
                ]
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Run Android checks
        env:
          KEYSTORE_PASSWORD: android
          KEY_ALIAS: ci
          KEY_PASSWORD: android
          NTFY_URL: https://ntfy.sh
          NTFY_TOKEN: ci
          NTFY_TOPIC_PATTERN: mobilemail/{user}
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon :app:lintDebug :app:testDebugUnitTest :app:assembleDebug
