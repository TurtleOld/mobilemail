name: Android CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secrets-scan:
    name: Secret scanning (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  checks:
    name: Lint / Detekt / Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Prepare CI files
        run: |
          mkdir -p .keystore app

          keytool -genkeypair \
            -alias ci \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storetype JKS \
            -keystore .keystore/release.jks \
            -storepass android \
            -keypass android \
            -dname "CN=CI,O=MobileMail,C=US"

          cat > app/google-services.json <<'EOF'
          {
            "project_info": {
              "project_number": "1234567890",
              "project_id": "mobilemail-ci",
              "storage_bucket": "mobilemail-ci.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:1234567890:android:abcdef123456",
                  "android_client_info": {
                    "package_name": "com.mobilemail"
                  }
                },
                "api_key": [
                  {
                    "current_key": "fake-ci-key"
                  }
                ]
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Run Android checks
        env:
          KEYSTORE_PASSWORD: android
          KEY_ALIAS: ci
          KEY_PASSWORD: android
          NTFY_URL: https://ntfy.sh
          NTFY_TOKEN: ci
          NTFY_TOPIC_PATTERN: mobilemail/{user}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon --build-cache :app:lintDebug :app:detekt :app:testDebugUnitTest

      - name: Verify baseline profile is committed
        run: |
          PROFILE="app/src/main/baseline-prof.txt"
          if [ ! -f "$PROFILE" ]; then
            echo "::error file=$PROFILE::baseline-prof.txt is missing." \
              "Run the 'Generate Baseline Profile' workflow and commit the result."
            exit 1
          fi
          echo "Baseline profile present ($(wc -l < "$PROFILE") lines)"
