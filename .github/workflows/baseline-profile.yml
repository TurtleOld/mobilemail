name: Generate Baseline Profile

on:
  workflow_dispatch:
  # Re-generate after each release to keep the profile current
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pull-requests: write

jobs:
  generate-baseline-profile:
    name: Generate & commit baseline profile
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Enable KVM for emulator hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "GOOGLE_SERVICES_JSON_BASE64 secret is not set" >&2
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > app/google-services.json

      - name: Generate baseline profile
        uses: reactivecircus/android-emulator-runner@v2
        env:
          KEYSTORE_PASSWORD: android
          KEY_ALIAS: ci
          KEY_PASSWORD: android
          NTFY_URL: https://ntfy.sh
          NTFY_TOKEN: ci
          NTFY_TOPIC_PATTERN: mobilemail/{user}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
        with:
          # minSdk for baseline-profile module is 26; use API 34 for stable emulator
          api-level: 34
          arch: x86_64
          profile: pixel_6
          target: google_apis
          disable-animations: true
          script: |
            chmod +x ./gradlew
            ./gradlew --no-daemon :baseline-profile:generateBaselineProfile \
              -Pandroid.testInstrumentationRunnerArguments.targetAppId=com.mobilemail

      - name: Verify profile was generated
        run: |
          PROFILE="app/src/main/baseline-prof.txt"
          if [ ! -f "$PROFILE" ]; then
            echo "baseline-prof.txt was not generated at $PROFILE" >&2
            exit 1
          fi
          echo "Profile size: $(wc -l < "$PROFILE") lines"

      - name: Open PR with updated baseline profile
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "perf: regenerate baseline profile"
          title: "perf: update baseline profile"
          body: |
            Auto-generated by the *Generate Baseline Profile* workflow.

            Triggered by: `${{ github.ref_name }}`
          branch: chore/baseline-profile-update
          delete-branch: true
          labels: performance
