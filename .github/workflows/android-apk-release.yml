name: Android APK Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pre-release-checks:
    name: Lint / Detekt (release variant)
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "GOOGLE_SERVICES_JSON_BASE64 secret is not set" >&2
            exit 1
          fi
          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > app/google-services.json

      - name: Run release checks
        env:
          KEYSTORE_PASSWORD: android
          KEY_ALIAS: ci
          KEY_PASSWORD: android
          NTFY_URL: https://ntfy.sh
          NTFY_TOKEN: ci
          NTFY_TOPIC_PATTERN: mobilemail/{user}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon --build-cache :app:lintRelease :app:detekt

  release-apk:
    name: Build & publish signed APK
    runs-on: ubuntu-latest
    needs: pre-release-checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract app version from tag
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          APP_VERSION_NAME="${RELEASE_TAG#v}"

          if [ -z "$APP_VERSION_NAME" ] || [ "$APP_VERSION_NAME" = "$RELEASE_TAG" ]; then
            echo "Tag must look like v1.2.3, got: $RELEASE_TAG" >&2
            exit 1
          fi

          # Derive versionCode from semver: 1.2.3 → 10203, 1.12.0 → 11200
          MAJOR="$(echo "$APP_VERSION_NAME" | cut -d. -f1)"
          MINOR="$(echo "$APP_VERSION_NAME" | cut -d. -f2)"
          PATCH="$(echo "$APP_VERSION_NAME" | cut -d. -f3)"
          APP_VERSION_CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))

          echo "APP_VERSION_NAME=$APP_VERSION_NAME" >> "$GITHUB_ENV"
          echo "APP_VERSION_CODE=$APP_VERSION_CODE" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "ANDROID_KEYSTORE_BASE64 secret is not set" >&2
            exit 1
          fi

          mkdir -p .keystore
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > .keystore/release.jks

      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: |
          if [ -z "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "GOOGLE_SERVICES_JSON_BASE64 secret is not set" >&2
            exit 1
          fi

          echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > app/google-services.json

      - name: Build signed release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          ANDROID_KEYSTORE_FILE: ${{ github.workspace }}/.keystore/release.jks
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          NTFY_URL: ${{ secrets.NTFY_URL }}
          NTFY_TOKEN: ${{ secrets.NTFY_TOKEN }}
          NTFY_TOPIC_PATTERN: ${{ secrets.NTFY_TOPIC_PATTERN }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          MOBILE_PUSH_PROXY_URL: ${{ secrets.MOBILE_PUSH_PROXY_URL }}
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon --build-cache :app:assembleRelease \
            -PVERSION_NAME="$APP_VERSION_NAME" \
            -PVERSION_CODE="$APP_VERSION_CODE"

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk-${{ github.ref_name }}
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error

      - name: Upload APK to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          gh release upload "$RELEASE_TAG" \
            app/build/outputs/apk/release/app-release.apk \
            --clobber
