build:
  maxIssues: 0

style:
  MagicNumber:
    active: false
  WildcardImport:
    active: false
  ForbiddenComment:
    active: false
  MaxLineLength:
    maxLineLength: 140
  ReturnCount:
    max: 4

complexity:
  LongMethod:
    threshold: 80
    ignoreAnnotated:
      - Composable
      - Preview
  LongParameterList:
    functionThreshold: 8
    constructorThreshold: 8
    ignoreAnnotated:
      - Composable
      - Preview
  TooManyFunctions:
    thresholdInInterfaces: 20
    thresholdInClasses: 31
    thresholdInObjects: 31
    thresholdInFiles: 31
  CyclomaticComplexMethod:
    threshold: 20
    ignoreAnnotated:
      - Composable
      - Preview
  NestedBlockDepth:
    threshold: 6

naming:
  FunctionNaming:
    active: true
    ignoreAnnotated:
      - Composable
      - Preview
  TopLevelPropertyNaming:
    active: false

exceptions:
  TooGenericExceptionCaught:
    active: false
  SwallowedException:
    active: false
